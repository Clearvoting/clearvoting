<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bill — ClearVoting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/styles.css">
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
</head>
<body>
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <header class="site-header">
        <div class="header-inner">
            <a href="/" class="logo">Clear<span>Voting</span></a>
            <button class="hamburger" aria-label="Toggle navigation" aria-expanded="false">&#9776;</button>
            <nav>
                <a href="/">Home</a>
                <a href="/#browse">Browse Bills</a>
                <a href="/about">About</a>
            </nav>
        </div>
    </header>

    <main id="main-content">
        <div id="bill-content">
            <div class="loading"><span class="spinner"></span> Loading bill...</div>
        </div>
    </main>

    <footer class="site-footer">
        <p>Data sourced from <a href="https://congress.gov" target="_blank" rel="noopener">Congress.gov</a> and <a href="https://senate.gov" target="_blank" rel="noopener">Senate.gov</a>.</p>
        <p>ClearVoting does not express opinions on legislation or representatives.</p>
    </footer>

    <button class="feedback-btn" id="feedback-open" aria-label="Send feedback">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Feedback
    </button>

    <div id="feedback-modal" class="feedback-modal" hidden>
        <div class="feedback-overlay" id="feedback-overlay"></div>
        <form class="feedback-form" id="feedback-form">
            <h3>Send Feedback</h3>
            <p class="feedback-context" id="feedback-context"></p>
            <textarea id="feedback-message" placeholder="What's on your mind?" rows="4" required maxlength="2000"></textarea>
            <div class="feedback-actions">
                <button type="button" class="btn btn-secondary btn-small" id="feedback-cancel">Cancel</button>
                <button type="submit" class="btn btn-primary btn-small" id="feedback-submit" style="width:auto">Send</button>
            </div>
            <p class="feedback-status" id="feedback-status" hidden></p>
        </form>
    </div>

    <script src="/static/js/vote.js?v=2"></script>
    <script src="/static/js/bill.js?v=2"></script>
    <script src="/static/js/feedback.js?v=2"></script>
</body>
</html>
